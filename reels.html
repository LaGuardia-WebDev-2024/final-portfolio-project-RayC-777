      /* Styling Only Related To THIS Page */

.parent-flex {
  display: flex;
  justify-content: center;

  flex-wrap: wrap;
  gap: 20px;              /* Clean gap spacing between media items */
  padding: 20px;          /* Increased padding for vertical spacing */

  width: 90vw;
  max-width: 100%;
}

/* Modifying your image block to work with the lightbox wrapper structure */
.lightbox-item img {
  width: 90%;            /* Fills out the 23% wrapper size cleanly */
  max-width: 100%;
  border-radius: 10px;
  border: 5px solid white;
  object-fit: contain;
  box-sizing: border-box;
  cursor: zoom-in;        /* Changes mouse arrow to a magnifying glass */
  transition: transform 0.2s ease;
}

.lightbox-item img:hover {
  transform: scale(1.03); /* Slight lift effect when hovering over images */
}

/* Wrapped styles specifically for the width constraint you wanted */
.lightbox-item {
  width: 25%;             /* Moved your original image width constraint here */
  min-width: 250px;       /* Keeps images from getting microscopic on phones */
}

video {
  width: 35%;
  max-width: 150%;
  min-width: 280px;       /* Responsive safety net */
  border-radius: 10px;
  border: 5px solid white;
  object-fit: contain;
  box-sizing: border-box;
}

/* ==========================================
   NEW LIGHTBOX POPUP CODE (APPEND TO BOTTOM)
   ========================================== */

/* The dark background overlay backdrop */
.lightbox-overlay {
  display: none; 
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9); 
  z-index: 9999;          /* Ensures it sits on top of your background wallpaper */
  justify-content: center;
  align-items: center;
}

/* Big floating photo within open popup */
.lightbox-overlay img {
  max-width: 90%;
  max-height: 85%;
  border-radius: 8px;
  border: 4px solid #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* The close 'X' text configuration */
.lightbox-close {
  position: absolute;
  top: 20px;
  right: 35px;
  color: #fff;
  font-size: 50px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}

/* Added to the bottom of the <style> section: */

/* 1. Sets the global size, white color, and center placement for both arrows */
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 60px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  padding: 0 20px;
  transition: color 0.2s ease;
  z-index: 10000;
}

/* 2. Dims the arrow slightly when hovered to show it is a button */
.lightbox-nav:hover {
  color: #ccc; 
}

/* 3. Pushes individual arrows to their respective far edges of the viewport */
.lightbox-prev { left: 20px; }
.lightbox-next { right: 20px; }



    </style>

<!-- THE NEW CODE WITH ARROWS ADDED: -->
<div id="lightboxOverlay" class="lightbox-overlay">
  <span class="lightbox-close">&times;</span>
  
  <!-- Added these two lines here: -->
  <span class="lightbox-nav lightbox-prev">&lt;</span>
  <span class="lightbox-nav lightbox-next">&gt;</span>
  
  <img id="lightboxActiveImg" src="" alt="Popup Window View">
</div>



  <!-- ==========================================
     JAVASCRIPT FUNCTIONALITY SECTION
     ========================================== -->
  <script>
    // 1. Grab all necessary HTML elements from the page
    const overlay = document.getElementById('lightboxOverlay');
    const activeImg = document.getElementById('lightboxActiveImg');
    const closeBtn = document.querySelector('.lightbox-close');
    const prevBtn = document.querySelector('.lightbox-prev');
    const nextBtn = document.querySelector('.lightbox-next');
    
    // 2. Convert the image list into an array to keep track of their positions (indexes)
    const images = Array.from(document.querySelectorAll('.lightbox-item img'));
    let currentIndex = 0;

    // 3. Helper function to update the big popup image based on the tracking index
    function updateLightboxImage() {
      activeImg.src = images[currentIndex].src;
    }

    // 4. Attach click events to all thumbnail images to open the lightbox
    images.forEach((img, index) => {
      img.addEventListener('click', () => {
        currentIndex = index; // Save the position of the clicked image
        updateLightboxImage();
        overlay.style.display = 'flex'; // Reveal the dark backdrop
      });
    });

    // 5. Navigation function: Move to the previous photo
    function showPrevImage() {
      currentIndex--;
      if (currentIndex < 0) {
        currentIndex = images.length - 1; // If at the start, loop back to the end
      }
      updateLightboxImage();
    }

    // 6. Navigation function: Move to the next photo
    function showNextImage() {
      currentIndex++;
      if (currentIndex >= images.length) {
        currentIndex = 0; // If at the end, loop back to the start
      }
      updateLightboxImage();
    }

    // 7. Event listeners for clicking the arrow/carrot elements
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // Stops the background click from closing the window
      showPrevImage();
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // Stops the background click from closing the window
      showNextImage();
    });

    // 8. Desktop Keyboard Controls (Left/Right arrows change photos, Escape closes)
    document.addEventListener('keydown', (e) => {
      if (overlay.style.display === 'flex') {
        if (e.key === 'ArrowLeft') showPrevImage();
        if (e.key === 'ArrowRight') showNextImage();
        if (e.key === 'Escape') overlay.style.display = 'none';
      }
    });

    // 9. Close the lightbox when clicking the 'X' button
    closeBtn.addEventListener('click', () => {
      overlay.style.display = 'none';
    });

    // 10. Close the lightbox when clicking anywhere on the dark background area
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.style.display = 'none';
      }
    });
  </script>
